name: 'Create iOS API References PR'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the API references'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Version number for the API references'
        required: true
        type: string

jobs:
  create-ios-api-references:
    name: 'Create iOS API References PR'
    runs-on: 'macos-14'
    permissions:
      contents: write
    steps:
      - name: 'Checkout main'
        uses: 'actions/checkout@v5'
        with:
          path: 'src'
          ref: 'main'

      - name: 'Setup Xcode'
        uses: 'maxim-lobanov/setup-xcode@v1'
        with:
          xcode-version: 'latest-stable'

      - name: 'Checkout api-references repository'
        uses: 'actions/checkout@v5'
        with:
          path: 'api-references'
          ref: 'main'
          repository: 'joyfill/api-references'
          token: ${{ secrets.UPDATE_DOCS_TOKEN }}

      - name: 'Generate DocC documentation'
        working-directory: src
        run: |
          set -eu

          MODULES="Joyfill JoyfillModel JoyfillFormulas JoyfillAPIService"

          # Ensure the output parent directory exists before docc writes into it.
          mkdir -p ./docs-output

          for MODULE in $MODULES; do
            echo "::group::Building DocC for $MODULE"

            xcodebuild docbuild \
              -scheme "$MODULE" \
              -destination 'generic/platform=iOS' \
              -derivedDataPath ./DerivedData

            DOCC_ARCHIVE=$(find ./DerivedData -name "$MODULE.doccarchive" | head -n 1)
            : "${DOCC_ARCHIVE:?Could not find $MODULE.doccarchive under ./DerivedData}"
            echo "Found archive: $DOCC_ARCHIVE"

            xcrun docc process-archive transform-for-static-hosting \
              "$DOCC_ARCHIVE" \
              --output-path "./docs-output/$MODULE" \
              --hosting-base-path "/api-references/ios/$MODULE"

            echo "::endgroup::"
          done

          echo "Generated documentation for: $MODULES"
          ls -la ./docs-output

      - name: 'Copy generated docs to api-references repository'
        run: |
          # Create ios directory if it doesn't exist
          mkdir -p api-references/ios

          # Remove old docs and copy new ones
          rm -rf api-references/ios/Joyfill api-references/ios/JoyfillModel api-references/ios/JoyfillFormulas api-references/ios/JoyfillAPIService
          cp -r src/docs-output/* api-references/ios/

      - name: 'Check for changes'
        id: newFiles
        working-directory: api-references
        run: |
          if [[ $(git status --porcelain | wc -l) -gt 0 ]]; then
            echo "hasNewFiles=true" >> $GITHUB_OUTPUT
          else
            echo "hasNewFiles=false" >> $GITHUB_OUTPUT
          fi

      - name: 'Setup Git'
        if: ${{ steps.newFiles.outputs.hasNewFiles == 'true' }}
        working-directory: api-references
        run: git config --global http.postBuffer 524288000

      - name: 'Create Pull Request'
        if: ${{ steps.newFiles.outputs.hasNewFiles == 'true' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.UPDATE_DOCS_TOKEN }}
          path: 'api-references'
          title: 'iOS SDK API references update for (${{ inputs.version }})'
          body: |
            ## iOS SDK API References Update for Version ${{ inputs.version }}

            This PR updates the iOS SDK API reference documentation.

            ### What's Included
            - Generated DocC documentation for all Joyfill iOS modules:
              - Joyfill (main UI library)
              - JoyfillModel
              - JoyfillFormulas
              - JoyfillAPIService
            - Static HTML documentation ready for hosting

            ### Context
            This PR is automatically created as part of the release process for [components-swift](https://github.com/${{ github.repository }}).

            ### Next Steps
            - Review the generated API reference documentation
            - Merge this PR to publish the updated API references for version **${{ inputs.version }}**

            ---

            *This PR was automatically generated by the release workflow.*
          commit-message: 'docs: update ios api references for ${{ inputs.version }}'
          branch: 'docs/ios-api-references-${{ inputs.version }}'
          assignees: ${{ github.actor }}
          labels: |
            ios
            documentation
            api-references
          base: 'main'
